services:
  composer:
    image: composer:latest
    volumes:
      - ./src/backend:/app
    working_dir: /app
  backend:
    build:
      context: .
      dockerfile: dockerfiles/php.dockerfile
    volumes:
      - ./src/backend:/app

  server:
    build:
      context: .
      dockerfile: dockerfiles/nginx.dockerfile
    ports:
      - "8000:80"
    volumes:
      - ./src/backend:/app
    depends_on:
      - backend

  frontend:
    build:
      context: .
      dockerfile: dockerfiles/frontend.dockerfile
    ports:
      - "5173:5173"
  db:
    image: mysql:8
    env_file:
      - ./env/mysql.env
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"

volumes:
  mysql_data:
